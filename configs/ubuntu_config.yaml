# ubuntu_config.yaml - Phase 0a laptop configuration
# Machine: ASUS TUF Gaming A17 FA706IC, Ubuntu 26.04 LTS
# Audio: ALC256 Analog via plughw:2,0 (3.5mm TRRS earphone + inline mic)

audio:
  input_device: "plughw:2,0"
  output_device: "plughw:2,0"
  sample_rate: 16000
  channels: 1
  chunk_size: 512
  record_seconds: 5

vad:
  model_path: "models/silero/silero_vad_v4.onnx"
  silence_threshold: 0.6
  min_speech_duration_ms: 250
  min_silence_duration_ms: 500

asr:
  model_size: "tiny"
  device: "cpu"
  compute_type: "int8"
  language: "en"

llm:
  primary_model: "llama3.2:1b-instruct-q4_K_M"
  fallback_model: "tinyllama:1.1b"
  ollama_host: "http://127.0.0.1:11434"
  max_tokens: 150
  temperature: 0.7

tts:
  model_path: "models/piper/en_US-amy-medium.onnx"
  config_path: "models/piper/en_US-amy-medium.onnx.json"
  sample_rate: 22050

noise_reduction:
  enabled: true

logging:
  level: "INFO"
