# dev_config.yaml — WSL2 development environment configuration.
#
# Audio device selection for the WSL2 host. WSL2 typically does not have
# direct access to host microphones, so input_device is null by default
# (record() will raise a clear error if called without an override).
# Tests use pre-recorded .wav files and do not require a live device.
audio:
  # Sample rate for all in-pipeline audio (Hz).
  sample_rate: 16000
  # Telephony source sample rate (Hz). Used by resample_8_to_16k().
  telephony_sample_rate: 8000
  # Single channel — all pipeline audio is mono.
  channels: 1
  # 16-bit PCM. sounddevice float32 used in-memory; .wav files written as int16.
  dtype: int16
  # Input device. null = sounddevice default.
  input_device: null
  # Output device. null = sounddevice default.
  output_device: null
  # Default recording duration when caller does not pass one.
  default_record_duration_sec: 5.0

paths:
  # All recordings written here; gitignored.
  recordings_dir: recordings

# Conversation manager configuration (Week 3 Day 1).
# Controls multi-turn history, system prompt, and SQLite session persistence.
conversation:
  # System prompt prepended to every LLM call. Kept terse to minimise tokens
  # and keep responses short — critical for the 3s perceived-latency target.
  # Real call utterances are 3-5s; the model must answer concisely.
  system_prompt: >-
    You are a voice assistant on a phone call. MAXIMUM one sentence. Never use
    bullet points, asterisks, markdown, newlines, or lists. Plain
    spoken words only. No lists. No explanations. If unsure, say so briefly.
  # Rolling window: max number of (user, assistant) turn PAIRS retained
  # in-memory and sent to the LLM. Older pairs are evicted but remain in
  # SQLite for offline review. 6 pairs ≈ 12 messages ≈ comfortably within
  # both Llama 3.2 1B (128K) and TinyLlama (2K) context windows.
  max_history_turns: 6
  # SQLite database file for session persistence. Schema is auto-created
  # on first use. Parent directory must exist.
  db_path: recordings/conversations.db

  # Noise reduction (Week 3 Day 3). Applied to mic/telephony audio before
# VAD and ASR. Disable on Pi if the latency budget is too tight.
noise_reduction:
  enabled: true
  # stationary=false adapts to changing noise (better for varied call audio);
  # true is cheaper but assumes constant background noise.
  stationary: false
  # 0.0 = no reduction, 1.0 = maximum. Lower if speech sounds distorted.
  prop_decrease: 1.0

# Pipeline streaming (Week 3 Day 4). Bounds how far TTS synthesis may run
# ahead of playback before back-pressure pauses it — caps memory on the Pi.
pipeline:
  tts_buffer_max_chunks: 3

telephony:
  port: /dev/ttyUSB2          # SIM7600 HAT AT interface; overridden on Pi
  baudrate: 115200
  timeout_s: 2.0
  ring_poll_timeout_s: 30.0